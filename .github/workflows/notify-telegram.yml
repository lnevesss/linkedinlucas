name: Notify Telegram — LinkedIn Post

on:
  push:
    branches: [main]
    paths:
      - 'posts/rascunhos/*.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Send post to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          POST_FILE=$(git diff --name-only HEAD~1 HEAD -- 'posts/rascunhos/*.md' | head -1)
          if [ -z "$POST_FILE" ]; then
            echo "Nenhum arquivo de rascunho novo encontrado"
            exit 0
          fi
          export POST_FILE
          python3 << 'EOF'
          import json, urllib.request, os, re

          token = os.environ['TELEGRAM_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          post_file = os.environ['POST_FILE']
          date = os.path.basename(post_file).replace('.md', '')

          with open(post_file, 'r', encoding='utf-8') as f:
              content = f.read()

          match = re.search(r'## Post \(copiar e colar no LinkedIn\)\n\n(.*?)\n---', content, re.DOTALL)
          post_text = match.group(1).strip() if match else content

          message = f'*[LinkedIn] Rascunho — {date}*\n\n{post_text}\n\n---\nSe aprovar: poste no LinkedIn e mova o arquivo para posts/publicados/'

          data = json.dumps({
              'chat_id': chat_id,
              'text': message,
              'parse_mode': 'Markdown'
          }).encode('utf-8')

          req = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=data,
              headers={'Content-Type': 'application/json'}
          )
          urllib.request.urlopen(req)
          print('Telegram enviado com sucesso')
          EOF
